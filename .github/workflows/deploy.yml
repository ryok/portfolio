name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch YAML data from LIFE repo
        env:
          GH_TOKEN: ${{ secrets.LIFE_REPO_TOKEN }}
        run: |
          mkdir -p src/data
          for file in projects.yaml career.yaml skills.yaml talks.yaml writings.yaml; do
            curl -sL -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.raw+json" \
              "https://api.github.com/repos/ryok/LIFE/contents/portfolio/$file" \
              -o "src/data/$file"
          done

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          PUBLIC_GA_ID: ${{ vars.PUBLIC_GA_ID }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
